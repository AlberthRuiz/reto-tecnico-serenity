playwright {
  browser = "chromium"
  headless = true
  default.timeout = 30000
  navigation.timeout = 30000
  viewport.width = 1920
  viewport.height = 1080
}

playwright.browser = ${?PLAYWRIGHT_BROWSER}
playwright.headless = ${?PLAYWRIGHT_HEADLESS}

environments {
  default {
    webdriver.base.url = "https://selenium.dev"
    restapi.baseurl = "https://reqres.in"
    reqres.apikey = ${?REQRES_API_KEY}
  }
}

environments.default.reqres.apikey = ${?REQRES_API_KEY}

serenity {
  project.name = "QA Automation Challenge"
  take.screenshots = FOR_FAILURES
  report.encoding = "UTF-8"
}